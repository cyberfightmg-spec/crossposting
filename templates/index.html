<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeaduxAI - Кросспостинг сервис</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; font-size: 1.2rem; margin-bottom: 40px; }
        .platforms { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .btn { padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-vk { background: #0077FF; color: #fff; }
        .btn-dzen { background: #FF6B00; color: #fff; }
        .btn-pinterest { background: #E60023; color: #fff; }
        .btn-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }
        .btn-youtube { background: #FF0000; color: #fff; }
        .info { color: #666; font-size: 0.9rem; }
        .footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #222; }
        .footer a { color: #667eea; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LeaduxAI</h1>
        <p class="subtitle">Кросспостинг из Telegram</p>
        
        <div class="platforms">
            <a href="https://vk.com/leaduxai" class="btn btn-vk" target="_blank">VK</a>
            <a href="https://dzen.ru/leaduxai" class="btn btn-dzen" target="_blank">Дзен</a>
            <a href="https://pinterest.com/leaduxai" class="btn btn-pinterest" target="_blank">Pinterest</a>
            <a href="https://instagram.com/leaduxai" class="btn btn-instagram" target="_blank">Instagram</a>
            <a href="https://youtube.com/@leaduxai" class="btn btn-youtube" target="_blank">YouTube</a>
        </div>
        
        <p class="info">Автоматическая публикация из Telegram канала на все платформы</p>
        
        <div class="footer">
            <a href="/privacy">Политика конфиденциальности</a>
        </div>
    </div>
</body>
</html>
